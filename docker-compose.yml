services:
  postgres:
    image: postgres:16-alpine
    container_name: cognifit_postgres
    environment:
      POSTGRES_DB: cognifit
      POSTGRES_USER: cognifit_api
      POSTGRES_PASSWORD: cognifit_api_dev_password
    ports:
      - "5432:5432"
    volumes:
      - cognifit_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./database/002_pln_integration.sql:/docker-entrypoint-initdb.d/002_pln_integration.sql:ro
      - ./database/003_sync_exercises_from_bank.sql:/docker-entrypoint-initdb.d/003_sync_exercises_from_bank.sql:ro
      - ./database/004_user_roles_parent_specialist.sql:/docker-entrypoint-initdb.d/004_user_roles_parent_specialist.sql:ro
      - ./database/005_seed_test_items.sql:/docker-entrypoint-initdb.d/005_seed_test_items.sql:ro
      - ./database/026_billing_conekta.sql:/docker-entrypoint-initdb.d/026_billing_conekta.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognifit_api -d cognifit"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cognifit_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cognifit_redis_data:/data

  diagnosis_service:
    container_name: cognifit_diagnosis
    build:
      context: ./Pln/diagnosis_service
    environment:
      # La red de Docker Compose es IPv4. El Dockerfile trae :: por defecto
      # para que Railway funcione sin configuracion; aqui se fija el valor que
      # corresponde a esta red.
      BIND_HOST: "0.0.0.0"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8001/health').raise_for_status()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  recommendation_service:
    container_name: cognifit_recommendation
    build:
      context: ./Pln/recommendation_service
    environment:
      # La red de Docker Compose es IPv4. El Dockerfile trae :: por defecto
      # para que Railway funcione sin configuracion; aqui se fija el valor que
      # corresponde a esta red.
      BIND_HOST: "0.0.0.0"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8002/health').raise_for_status()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    container_name: cognifit_api
    build:
      context: ./api
    env_file:
      - ./api/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      diagnosis_service:
        condition: service_healthy
      recommendation_service:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  cognifit_postgres_data:
  cognifit_redis_data:
