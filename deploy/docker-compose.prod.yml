# ============================================================
# CogniFit — Compose de PRODUCCIÓN
# - Base de datos: Neon (externa, NO se levanta postgres aquí)
# - Se ejecuta en la VM Oracle Cloud Always Free
# - Caddy hace de reverse-proxy con HTTPS automático (Let's Encrypt)
#
# Uso (desde la raíz del repo, en la VM):
#   cp deploy/.env.prod.example deploy/.env.prod   # y editar
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
# ============================================================
services:
  redis:
    image: redis:7-alpine
    container_name: cognifit_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cognifit_redis_data:/data

  diagnosis_service:
    container_name: cognifit_diagnosis
    restart: unless-stopped
    build:
      context: ../Pln/diagnosis_service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8001/health').raise_for_status()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  recommendation_service:
    container_name: cognifit_recommendation
    restart: unless-stopped
    build:
      context: ../Pln/recommendation_service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8002/health').raise_for_status()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    container_name: cognifit_api
    restart: unless-stopped
    build:
      context: ../api
    env_file:
      - ./.env.prod
    depends_on:
      redis:
        condition: service_started
      diagnosis_service:
        condition: service_healthy
      recommendation_service:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Reverse proxy con HTTPS automático.
  # Requiere un dominio apuntando a la IP pública de la VM.
  caddy:
    image: caddy:2-alpine
    container_name: cognifit_caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  cognifit_redis_data:
  caddy_data:
  caddy_config:
